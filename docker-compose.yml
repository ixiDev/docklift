services:
  docklift-backend:
    build:
      context: ./backend
      args:
        - BUILD_BASE=${DOCKLIFT_BUILD_BASE:-oven/bun:1-alpine}
        - RUNTIME_BASE=${DOCKLIFT_RUNTIME_BASE:-node:22-alpine}
    container_name: docklift-backend
    hostname: docklift
    restart: unless-stopped
    expose:
      - "8000"
    # NOTE: privileged is required for nsenter into host PID 1 namespaces
    # (system updates, upgrades, reboot) — standard for self-hosted deployment platforms
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./deployments:/deployments
      - ./nginx-proxy/conf.d:/nginx-conf
      - ./backups:/data/backups
      - /etc/hostname:/host/hostname:ro
      - /etc/os-release:/host/os-release:ro
      - /proc:/host/proc:ro
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/docklift.db
      - PORT=8000
      - DEPLOYMENTS_PATH=/deployments
      - NGINX_CONF_PATH=/nginx-conf
      - DOCKER_NETWORK=docklift_network
      # Security: Generate new secrets with: node -e "require('crypto').randomBytes(64).toString('hex')"
      - JWT_SECRET=${JWT_SECRET:-}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-}
    networks:
      - docklift_network
    depends_on:
      - docklift-nginx-proxy

  docklift-frontend:
    build:
      context: ./frontend
      args:
        - BUILD_BASE=${DOCKLIFT_BUILD_BASE:-oven/bun:1-alpine}
        - RUNTIME_BASE=${DOCKLIFT_RUNTIME_BASE:-node:22-alpine}
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: docklift-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://docklift-backend:8000
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-3781fa1fc5bbf228bb728620c7a2fedc751660f5216243b56185346bdbcf8249}
    networks:
      - docklift_network
    depends_on:
      - docklift-backend

  docklift-nginx:
    image: nginx:stable-alpine
    container_name: docklift-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - docklift_network
    depends_on:
      - docklift-frontend
      - docklift-backend

  docklift-nginx-proxy:
    image: nginx:stable-alpine
    container_name: docklift-nginx-proxy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy/conf.d:/etc/nginx/conf.d:ro
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - docklift_network

networks:
  docklift_network:
    name: docklift_network
    driver: bridge
